### Hyprland configuration template (deployed to user's ~/.config/hypr/hyprland.conf)
### Adjust values to your hardware and preferences.

# Modifier key
$mod = SUPER

# General
general {
    gaps_in = 4
    gaps_out = 8
}

# Outputs — catchall for any monitor; override per-output as needed
monitor = , preferred, auto, 1

# Input (keyboard) - set repeat rate
input {
    repeat_delay = 300
    repeat_rate = 25
}

# Autostart programs (exec-once ensures single instance)
exec-once = hyprpaper
exec-once = hyprpolkitagent
exec-once = noctalia-shell
exec-once = mako
exec-once = wl-paste --watch cliphist store
exec-once = blueman-applet
exec-once = hypridle

# Launcher and terminal
bind = $mod, space, exec, hyprlauncher
bind = $mod, return, exec, foot

# Screenshot (use deployed helper scripts; hyprshot preferred if available)
bind = , print, exec, ~/.config/hypr/scripts/screenshot_selection.sh
bind = SHIFT, print, exec, ~/.config/hypr/scripts/screenshot_display.sh
bind = CTRL, print, exec, ~/.config/hypr/scripts/screenshot_window.sh

# Clipboard history
bind = $mod, v, exec, cliphist list | fuzzel -d | cliphist decode | wl-copy

# Lock screen
bind = $mod, l, exec, ~/.config/hypr/scripts/lock.sh

# Volume controls
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

# Brightness controls
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Window management
bind = $mod, f, togglefloating
bind = $mod, q, killactive
bind = $mod, m, fullscreen, 1

# Workspace switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
