# hyprlock configuration
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

general {
    hide_cursor = true
    ignore_empty_input = true
}

# Background — solid colour matching foot terminal theme
background {
    monitor =
    color = rgb(1c1824)
    blur_passes = 0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(ffffff)
    font_size = 96
    font_family = Sans
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgb(cccccc)
    font_size = 24
    font_family = Sans
    position = 0, 100
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(3b3450)
    inner_color = rgb(1c1824)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL</i>
    position = 0, -50
    halign = center
    valign = center
}
